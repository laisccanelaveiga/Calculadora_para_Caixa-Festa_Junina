<style>
  @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap');

  :root{
    --bg:#1a120b;
    --surface:#241a10;
    --surface-2:#2e2113;
    --surface-3:#3a2a17;
    --border:#4a3822;
    --text:#f5ebd8;
    --text-muted:#b8a48c;
    --yellow:#f2a93b;
    --yellow-deep:#c47f1f;
    --red:#c4432e;
    --green:#5c8a3a;
    --blue:#3a6ea5;
    --pink:#d46a8c;
  }

  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}

  body{
    margin:0;
    background:
      radial-gradient(ellipse at top, #2a1d10 0%, var(--bg) 55%);
    color:var(--text);
    font-family:'Inter', sans-serif;
    min-height:100vh;
    padding-bottom:calc(120px + env(safe-area-inset-bottom));
    padding-top:env(safe-area-inset-top);
  }

  /* Bandeirinhas / bunting header */
  .bunting{
    display:flex;
    justify-content:center;
    overflow:hidden;
    height:22px;
    margin-top:6px;
  }
  .flag{
    width:0; height:0;
    border-left:11px solid transparent;
    border-right:11px solid transparent;
    border-top:20px solid var(--c);
    margin:0 1px;
    opacity:0.9;
  }

  header{
    text-align:center;
    padding:14px 16px 20px;
  }
  header h1{
    font-family:'Baloo 2', sans-serif;
    font-weight:800;
    font-size:1.6rem;
    margin:6px 0 2px;
    color:var(--yellow);
    letter-spacing:0.3px;
  }
  header p{
    margin:0;
    color:var(--text-muted);
    font-size:0.85rem;
  }

  main{
    max-width:720px;
    margin:0 auto;
    padding:0 14px;
  }

  section{
    margin-bottom:22px;
  }

  .section-title{
    font-family:'Baloo 2', sans-serif;
    font-weight:700;
    font-size:1rem;
    color:var(--text);
    margin:0 0 10px;
    display:flex;
    align-items:center;
    justify-content:space-between;
  }

  .link-btn{
    background:none;
    border:none;
    color:var(--yellow);
    font-family:'Inter', sans-serif;
    font-weight:600;
    font-size:0.82rem;
    cursor:pointer;
    padding:4px 6px;
  }
  .link-btn:active{ opacity:0.6; }

  /* Product grid */
  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(140px, 1fr));
    gap:10px;
  }

  .prod-card{
    background:var(--surface);
    border:1px solid var(--border);
    border-left:5px solid var(--flag, var(--yellow));
    border-radius:14px;
    padding:12px 10px;
    text-align:left;
    cursor:pointer;
    display:flex;
    flex-direction:column;
    gap:4px;
    transition:transform 0.08s ease, background 0.15s ease;
    color:var(--text);
    min-height:88px;
    position:relative;
  }
  .prod-card:active{
    transform:scale(0.96);
    background:var(--surface-2);
  }
  .prod-emoji{ font-size:1.4rem; }
  .prod-name{
    font-weight:700;
    font-size:0.92rem;
    line-height:1.15;
  }
  .prod-price{
    font-weight:800;
    font-size:1rem;
    color:var(--yellow);
    margin-top:auto;
  }

  .prod-card.edit-mode{ cursor:default; }
  .prod-card input{
    background:var(--surface-2);
    border:1px solid var(--border);
    border-radius:8px;
    color:var(--text);
    font-family:'Inter',sans-serif;
    padding:5px 7px;
    font-size:0.85rem;
    width:100%;
  }
  .prod-card .del-btn{
    position:absolute;
    top:6px; right:6px;
    background:var(--red);
    color:#fff;
    border:none;
    border-radius:50%;
    width:22px; height:22px;
    font-size:0.8rem;
    line-height:1;
    cursor:pointer;
  }

  .add-prod-card{
    background:transparent;
    border:1.5px dashed var(--border);
    border-radius:14px;
    color:var(--text-muted);
    font-weight:700;
    font-size:0.9rem;
    min-height:88px;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
  }
  .add-prod-card:active{ background:var(--surface); }

  .emoji-row{
    display:flex;
    gap:4px;
    flex-wrap:wrap;
    margin-top:4px;
  }
  .emoji-row button{
    background:var(--surface-2);
    border:1px solid var(--border);
    border-radius:6px;
    font-size:1rem;
    padding:3px 6px;
    cursor:pointer;
  }
  .flag-row{
    display:flex;
    gap:6px;
    margin-top:4px;
  }
  .flag-dot{
    width:18px; height:18px;
    border-radius:50%;
    border:2px solid transparent;
    cursor:pointer;
  }
  .flag-dot.selected{ border-color:var(--text); }

  /* Current sale panel */
  .sale-panel{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:16px;
    padding:14px;
  }
  .sale-empty{
    color:var(--text-muted);
    font-size:0.88rem;
    text-align:center;
    padding:18px 0;
  }
  .sale-item{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:9px 4px;
    border-bottom:1px solid var(--border);
    font-size:0.92rem;
  }
  .sale-item:last-child{ border-bottom:none; }
  .sale-item-left{ display:flex; align-items:center; gap:8px; }
  .qty-badge{
    background:var(--surface-3);
    border-radius:20px;
    padding:2px 9px;
    font-weight:700;
    font-size:0.8rem;
    color:var(--yellow);
  }
  .sale-item-name{ font-weight:600; }
  .sale-item-sub{ color:var(--text-muted); font-size:0.78rem; }
  .sale-item-right{
    display:flex;
    align-items:center;
    gap:10px;
  }
  .sale-item-value{ font-weight:700; }
  .minus-btn{
    background:var(--surface-3);
    border:none;
    color:var(--text);
    width:26px; height:26px;
    border-radius:50%;
    font-size:1rem;
    cursor:pointer;
    line-height:1;
  }
  .minus-btn:active{ background:var(--red); }

  .sale-actions{
    display:flex;
    gap:8px;
    margin-top:12px;
  }
  .btn-secondary{
    flex:1;
    background:var(--surface-2);
    border:1px solid var(--border);
    color:var(--text-muted);
    font-family:'Inter', sans-serif;
    font-weight:600;
    font-size:0.82rem;
    padding:10px;
    border-radius:10px;
    cursor:pointer;
  }
  .btn-secondary:active{ background:var(--surface-3); }

  /* Sticky total bar */
  .total-bar{
    position:fixed;
    bottom:0; left:0; right:0;
    background:linear-gradient(180deg, rgba(26,18,11,0) 0%, var(--bg) 22%);
    padding:14px 14px calc(18px + env(safe-area-inset-bottom));
    display:flex;
    justify-content:center;
  }
  .total-bar-inner{
    max-width:720px;
    width:100%;
    display:flex;
    align-items:center;
    gap:12px;
    background:var(--surface-2);
    border:1px solid var(--yellow-deep);
    border-radius:18px;
    padding:12px 16px;
    box-shadow:0 8px 24px rgba(0,0,0,0.4);
  }
  .total-label{
    color:var(--text-muted);
    font-size:0.75rem;
    font-weight:600;
    text-transform:uppercase;
    letter-spacing:0.5px;
  }
  .total-value{
    font-family:'Baloo 2', sans-serif;
    font-weight:800;
    font-size:1.8rem;
    color:var(--yellow);
    line-height:1;
  }
  .finish-btn{
    margin-left:auto;
    background:var(--green);
    color:#fff;
    border:none;
    font-family:'Baloo 2', sans-serif;
    font-weight:700;
    font-size:1rem;
    padding:14px 20px;
    border-radius:14px;
    cursor:pointer;
  }
  .finish-btn:disabled{
    background:var(--surface-3);
    color:var(--text-muted);
    cursor:not-allowed;
  }
  .finish-btn:active:not(:disabled){ transform:scale(0.97); }

  /* History */
  .history-summary{
    display:flex;
    justify-content:space-between;
    background:var(--surface-2);
    border-radius:12px;
    padding:12px 14px;
    margin-bottom:10px;
    font-weight:700;
  }
  .history-summary .n{ color:var(--yellow); }
  .history-list{
    display:flex;
    flex-direction:column;
    gap:8px;
    max-height:260px;
    overflow-y:auto;
  }
  .history-item{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:12px;
    padding:10px 12px;
    font-size:0.85rem;
  }
  .history-item-top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-weight:700;
    margin-bottom:3px;
    gap:8px;
  }
  .history-item-top .val{ color:var(--yellow); flex:1; text-align:right; margin-right:8px; }
  .history-del-btn{
    background:var(--surface-3);
    border:none;
    color:var(--text-muted);
    width:24px; height:24px;
    border-radius:50%;
    font-size:0.85rem;
    line-height:1;
    cursor:pointer;
    flex-shrink:0;
  }
  .history-del-btn:active{ background:var(--red); color:#fff; }
  .history-item-detail{ color:var(--text-muted); font-size:0.78rem; }
  .history-empty{
    color:var(--text-muted);
    font-size:0.85rem;
    text-align:center;
    padding:14px 0;
  }

  .toast{
    position:fixed;
    top:14px; left:50%;
    transform:translateX(-50%);
    background:var(--green);
    color:#fff;
    padding:10px 18px;
    border-radius:30px;
    font-weight:700;
    font-size:0.85rem;
    opacity:0;
    pointer-events:none;
    transition:opacity 0.25s ease, top 0.25s ease;
    z-index:50;
  }
  .toast.show{ opacity:1; top:22px; }

  footer{
    text-align:center;
    color:var(--text-muted);
    font-size:0.72rem;
    padding:16px;
  }
</style>
</head>
<body>

<div class="bunting" id="bunting"></div>

<header>
  <h1>🌽 Caixa da Festa Junina</h1>
  <p>Toque nos produtos para somar a venda</p>
</header>

<main>

  <section>
    <div class="section-title">
      Produtos
      <button class="link-btn" id="toggleEdit">Editar produtos</button>
    </div>
    <div class="grid" id="productGrid"></div>
  </section>

  <section>
    <div class="section-title">Venda atual</div>
    <div class="sale-panel">
      <div id="saleList"></div>
      <div class="sale-actions">
        <button class="btn-secondary" id="undoBtn">↩ Remover último</button>
        <button class="btn-secondary" id="cancelBtn">✕ Cancelar venda</button>
      </div>
    </div>
  </section>

  <section>
    <div class="section-title">Histórico do dia</div>
    <div class="history-summary">
      <span>Total vendido hoje</span>
      <span class="n" id="dayTotal">R$ 0,00</span>
    </div>
    <div class="history-list" id="historyList"></div>
  </section>

</main>

<div class="total-bar">
  <div class="total-bar-inner">
    <div>
      <div class="total-label">Total a receber</div>
      <div class="total-value" id="totalValue">R$ 0,00</div>
    </div>
    <button class="finish-btn" id="finishBtn" disabled>Finalizar venda ✓</button>
  </div>
</div>

<div class="toast" id="toast">Venda registrada!</div>

<footer>Feito para facilitar seu plantão no caixa 🎉 — seus dados ficam salvos neste iPhone, mesmo se fechar o app.</footer>

<script>
// ---------- State ----------
const FLAG_COLORS = ['yellow','red','green','blue','pink'];
const EMOJIS = ['🎣','🌭','☕','🍬','🥤','🍭','🌽','🍮','🎪','🎯','🥧','🍿','🧁','🍡','🍫'];

let products = [
  // Bebidas
  { id: 1, name: 'Água', price: 2.00, emoji: '💧', flag: 'blue' },
  { id: 2, name: 'Água com Gás', price: 3.00, emoji: '🫧', flag: 'blue' },
  { id: 3, name: 'Guaravita', price: 3.00, emoji: '🧃', flag: 'blue' },
  { id: 4, name: 'Refrigerante (Lata)', price: 8.00, emoji: '🥤', flag: 'blue' },
  // Comidas
  { id: 5, name: 'Angú', price: 10.00, emoji: '🍲', flag: 'red' },
  { id: 6, name: 'Cachorro-quente', price: 10.00, emoji: '🌭', flag: 'red' },
  { id: 7, name: 'Caldos', price: 10.00, emoji: '🍜', flag: 'red' },
  { id: 8, name: 'Churrasco', price: 8.00, emoji: '🍢', flag: 'red' },
  { id: 9, name: 'Milho Verde', price: 5.00, emoji: '🌽', flag: 'red' },
  { id: 10, name: 'Pastel', price: 10.00, emoji: '🥟', flag: 'red' },
  { id: 11, name: 'Salsichão', price: 8.00, emoji: '🍖', flag: 'red' },
  // Doces
  { id: 12, name: 'Algodão Doce', price: 5.00, emoji: '🍭', flag: 'pink' },
  { id: 13, name: 'Canjica', price: 8.00, emoji: '🍮', flag: 'pink' },
  { id: 14, name: 'Doce/Bolo', price: 5.00, emoji: '🍰', flag: 'pink' },
  // Brincadeiras
  { id: 15, name: 'Brincadeiras 1 por', price: 5.00, emoji: '🎯', flag: 'green' },
  { id: 16, name: 'Brincadeiras 3 por', price: 12.00, emoji: '🎪', flag: 'green' },
  { id: 17, name: 'Pula-pula', price: 5.00, emoji: '🤸', flag: 'green' },
];
let nextProductId = 18;

let currentSale = []; // { productId, qty }
let history = []; // { id, time, items:[{name,qty,price}], total }
let editMode = false;

// ---------- Persistência (localStorage) ----------
const STORAGE_KEY = 'caixaJunina_v2';

function saveState(){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      products, nextProductId, currentSale, history
    }));
  } catch(e){
    // modo privado ou storage indisponível: segue apenas em memória
  }
}

function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return false;
    const data = JSON.parse(raw);
    if(data.products && data.products.length) products = data.products;
    if(data.nextProductId) nextProductId = data.nextProductId;
    if(data.currentSale) currentSale = data.currentSale;
    if(data.history) history = data.history;
    return true;
  } catch(e){
    return false;
  }
}

// ---------- Helpers ----------
function fmt(v){
  return 'R$ ' + v.toFixed(2).replace('.', ',');
}
function getProduct(id){
  return products.find(p => p.id === id);
}
function saleTotal(){
  return currentSale.reduce((sum, item) => {
    const p = getProduct(item.productId);
    return sum + (p ? p.price * item.qty : 0);
  }, 0);
}
function dayTotal(){
  return history.reduce((sum, h) => sum + h.total, 0);
}
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1400);
}

// ---------- Bunting ----------
function renderBunting(){
  const el = document.getElementById('bunting');
  el.innerHTML = '';
  const colors = ['red','yellow','green','blue','pink'];
  for(let i=0;i<15;i++){
    const f = document.createElement('div');
    f.className = 'flag';
    f.style.setProperty('--c', `var(--${colors[i % colors.length]})`);
    el.appendChild(f);
  }
}

// ---------- Products ----------
function sortProducts(){
  products.sort((a, b) => a.name.localeCompare(b.name, 'pt-BR', { sensitivity: 'base' }));
}

function renderProducts(){
  sortProducts();
  const grid = document.getElementById('productGrid');
  grid.innerHTML = '';

  products.forEach(p => {
    const card = document.createElement('div');
    card.className = 'prod-card' + (editMode ? ' edit-mode' : '');
    card.style.setProperty('--flag', `var(--${p.flag})`);

    if(editMode){
      card.innerHTML = `
        <button class="del-btn" title="Excluir">✕</button>
        <div class="prod-emoji">${p.emoji}</div>
        <input type="text" value="${p.name}" placeholder="Nome do produto" data-field="name">
        <input type="number" step="0.01" min="0" value="${p.price.toFixed(2)}" placeholder="Preço" data-field="price">
        <div class="flag-row"></div>
      `;
      const nameInput = card.querySelector('[data-field="name"]');
      const priceInput = card.querySelector('[data-field="price"]');
      nameInput.addEventListener('input', e => { p.name = e.target.value; saveState(); });
      priceInput.addEventListener('input', e => { p.price = parseFloat(e.target.value) || 0; saveState(); });
      card.querySelector('.del-btn').addEventListener('click', () => {
        products = products.filter(x => x.id !== p.id);
        saveState();
        renderProducts();
      });
      const flagRow = card.querySelector('.flag-row');
      FLAG_COLORS.forEach(c => {
        const dot = document.createElement('div');
        dot.className = 'flag-dot' + (p.flag === c ? ' selected' : '');
        dot.style.background = `var(--${c})`;
        dot.addEventListener('click', () => { p.flag = c; saveState(); renderProducts(); });
        flagRow.appendChild(dot);
      });
    } else {
      card.innerHTML = `
        <div class="prod-emoji">${p.emoji}</div>
        <div class="prod-name">${p.name || '(sem nome)'}</div>
        <div class="prod-price">${fmt(p.price)}</div>
      `;
      card.addEventListener('click', () => addToSale(p.id));
    }

    grid.appendChild(card);
  });

  if(editMode){
    const addCard = document.createElement('div');
    addCard.className = 'add-prod-card';
    addCard.textContent = '+ Novo produto';
    addCard.addEventListener('click', () => {
      products.push({
        id: nextProductId++,
        name: '',
        price: 0,
        emoji: EMOJIS[Math.floor(Math.random()*EMOJIS.length)],
        flag: FLAG_COLORS[Math.floor(Math.random()*FLAG_COLORS.length)]
      });
      saveState();
      renderProducts();
    });
    grid.appendChild(addCard);
  }
}

document.getElementById('toggleEdit').addEventListener('click', () => {
  editMode = !editMode;
  document.getElementById('toggleEdit').textContent = editMode ? 'Concluir edição' : 'Editar produtos';
  saveState();
  renderProducts();
});

// ---------- Sale ----------
function addToSale(productId){
  const existing = currentSale.find(i => i.productId === productId);
  if(existing){ existing.qty += 1; }
  else { currentSale.push({ productId, qty: 1 }); }
  saveState();
  renderSale();
}

function renderSale(){
  const list = document.getElementById('saleList');
  list.innerHTML = '';

  if(currentSale.length === 0){
    list.innerHTML = '<div class="sale-empty">Nenhum item ainda. Toque em um produto acima.</div>';
  } else {
    currentSale.forEach(item => {
      const p = getProduct(item.productId);
      if(!p) return;
      const row = document.createElement('div');
      row.className = 'sale-item';
      row.innerHTML = `
        <div class="sale-item-left">
          <span class="qty-badge">${item.qty}x</span>
          <div>
            <div class="sale-item-name">${p.emoji} ${p.name || '(sem nome)'}</div>
            <div class="sale-item-sub">${fmt(p.price)} cada</div>
          </div>
        </div>
        <div class="sale-item-right">
          <span class="sale-item-value">${fmt(p.price * item.qty)}</span>
          <button class="minus-btn" title="Diminuir">−</button>
        </div>
      `;
      row.querySelector('.minus-btn').addEventListener('click', () => {
        item.qty -= 1;
        if(item.qty <= 0){
          currentSale = currentSale.filter(i => i !== item);
        }
        saveState();
        renderSale();
      });
      list.appendChild(row);
    });
  }

  const total = saleTotal();
  document.getElementById('totalValue').textContent = fmt(total);
  document.getElementById('finishBtn').disabled = currentSale.length === 0;
}

document.getElementById('undoBtn').addEventListener('click', () => {
  if(currentSale.length === 0) return;
  const last = currentSale[currentSale.length - 1];
  last.qty -= 1;
  if(last.qty <= 0){ currentSale.pop(); }
  saveState();
  renderSale();
});

document.getElementById('cancelBtn').addEventListener('click', () => {
  if(currentSale.length === 0) return;
  if(confirm('Cancelar esta venda? Os itens selecionados serão apagados.')){
    currentSale = [];
    saveState();
    renderSale();
  }
});

document.getElementById('finishBtn').addEventListener('click', () => {
  if(currentSale.length === 0) return;
  const total = saleTotal();
  const items = currentSale.map(item => {
    const p = getProduct(item.productId);
    return { name: p.name, qty: item.qty, price: p.price };
  });
  const now = new Date();
  history.unshift({
    id: Date.now(),
    time: now.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' }),
    items,
    total
  });
  currentSale = [];
  saveState();
  renderSale();
  renderHistory();
  showToast('Venda registrada! ' + fmt(total));
});

// ---------- History ----------
function renderHistory(){
  const list = document.getElementById('historyList');
  list.innerHTML = '';
  document.getElementById('dayTotal').textContent = fmt(dayTotal());

  if(history.length === 0){
    list.innerHTML = '<div class="history-empty">Nenhuma venda registrada ainda.</div>';
    return;
  }

  history.forEach(h => {
    const detail = h.items.map(i => `${i.qty}x ${i.name || '(sem nome)'}`).join(', ');
    const div = document.createElement('div');
    div.className = 'history-item';
    div.innerHTML = `
      <div class="history-item-top">
        <span>${h.time}</span>
        <span class="val">${fmt(h.total)}</span>
        <button class="history-del-btn" title="Excluir venda">✕</button>
      </div>
      <div class="history-item-detail">${detail}</div>
    `;
    div.querySelector('.history-del-btn').addEventListener('click', () => {
      if(confirm('Excluir esta venda do histórico? Essa ação não pode ser desfeita.')){
        history = history.filter(x => x.id !== h.id);
        saveState();
        renderHistory();
      }
    });
    list.appendChild(div);
  });
}

// ---------- Init ----------
loadState();
renderBunting();
renderProducts();
renderSale();
renderHistory();
</script>

</body>
</html>
